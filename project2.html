<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CryptoConvert | Real-time Calculator</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #00ff88; padding: 30px; border-radius: 2px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        h1 { font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; opacity: 0.7; }
        input { background: transparent; border: 1px solid #333; color: #00ff88; padding: 10px; width: 100%; box-sizing: border-box; font-size: 1.1rem; }
        input:focus { border-color: #00ff88; outline: none; }
        .result { margin-top: 20px; font-weight: bold; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>[Crypto_Converter]</h1>
        <div class="field">
            <label>AMOUNT IN USD</label>
            <input type="number" id="usd" placeholder="0.00" oninput="calc()">
        </div>
        <div class="field">
            <label>BITCOIN PRICE (EST.)</label>
            <input type="number" id="price" value="65000" oninput="calc()">
        </div>
        <div class="result">
            RESULT: <span id="res">0.00000000</span> BTC
        </div>
    </div>

    <script>
        function calc() {
            const usd = document.getElementById('usd').value;
            const price = document.getElementById('price').value;
            const res = document.getElementById('res');
            if(usd && price) {
                const total = usd / price;
                res.innerText = total.toFixed(8);
            }
        }
    </script>
</body>
</html>
