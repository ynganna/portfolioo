<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aura Weather | Minimalist Forecast</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e3a8a, #581c87); font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 40px; text-align: center; color: white; width: 300px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .temp { font-size: 5rem; font-weight: bold; margin: 10px 0; }
        .city { font-size: 1.5rem; opacity: 0.8; }
        .search-box { margin-bottom: 20px; }
        input { background: rgba(255,255,255,0.2); border: none; padding: 10px; border-radius: 20px; color: white; text-align: center; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="search-box">
            <input type="text" id="citySearch" placeholder="Search city..." onchange="updateWeather()">
        </div>
        <div class="city" id="cityName">London, UK</div>
        <div class="temp" id="tempValue">18°C</div>
        <div id="condition">Cloudy</div>
    </div>

    <script>
        function updateWeather() {
            const city = document.getElementById('citySearch').value;
            document.getElementById('cityName').innerText = city.toUpperCase();
            // Simula cambio dati
            const randomTemp = Math.floor(Math.random() * 35);
            document.getElementById('tempValue').innerText = `${randomTemp}°C`;
        }
    </script>
</body>
</html>
