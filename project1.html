<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task manager | Productivity Tool</title>
    <style>
        :root { --bg: #0f172a; --accent: #6366f1; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        h2 { border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #334155; color: white; }
        button { background: var(--accent); border: none; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #334155; margin-bottom: 8px; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .delete-btn { background: #ef4444; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Task manager</h2>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script>
        const taskList = document.getElementById('taskList');
        const input = document.getElementById('taskInput');

        function addTask() {
            if (input.value.trim() === "") return;
            const li = document.createElement('li');
            li.innerHTML = `${input.value} <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>`;
            taskList.appendChild(li);
            input.value = "";
        }
    </script>
</body>
</html>
